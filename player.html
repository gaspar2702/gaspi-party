<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📱 Jugador - Carrera Phishing</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0;font-family:'Nunito',sans-serif;}
:root{
  --bg:#131326;
  --card:#1e1e38;
  --primary:#45d0f5;
  --p1:#ff4757;
  --text:#fff;
}

body{
  background:var(--bg); color:var(--text);
  display:flex; flex-direction:column; min-height:100vh; padding:20px;
}

h1{font-family:'Fredoka One',cursive;font-size:24px;text-align:center;margin-bottom:20px;color:var(--primary);}

.state-card{
  background:var(--card); border-radius:16px; padding:24px; text-align:center;
  box-shadow:0 8px 30px rgba(0,0,0,0.4); max-width:400px; width:100%; margin:0 auto;
}

input, button{
  width:100%; border:none; border-radius:12px; padding:16px; font-size:16px; margin-top:12px;
}
input{background:#2a2a55;color:#fff;text-align:center;font-weight:700;}
input::placeholder{color:#7777aa;font-weight:400;}

button{
  background:var(--primary); color:#0d0d1a; font-family:'Fredoka One',cursive; cursor:pointer;
  transition:transform 0.15s;
}
button:active{transform:scale(0.95);}
button:disabled{opacity:0.5;pointer-events:none;}

.avatar-grid{
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px;
}
.av-btn{
  background:#2a2a55; font-size:28px; padding:12px; border-radius:12px;
  border:2px solid transparent; cursor:pointer;
}
.av-btn.selected{border-color:var(--primary);background:rgba(69,208,245,0.2);}

.loader{
  width:40px;height:40px;border:4px solid rgba(255,255,255,0.1);
  border-left-color:var(--primary);border-radius:50%;
  animation:spin 1s linear infinite; margin:20px auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ESTILOS DE JUEGO ACTIVO */
.turn-box {
  background: #2a2a55; border-radius: 12px; padding: 20px; margin-top: 15px;
}
.turn-box.mine { border: 2px solid #00d2a0; background: rgba(0, 210, 160, 0.1); }
.turn-box h3 { margin-bottom: 10px; font-family: 'Fredoka One', cursive; }

.question-box { text-align: left; margin-top: 15px; }
.question-box h3 { font-size: 18px; margin-bottom: 15px; }
.options-grid { display: flex; flex-direction: column; gap: 10px; }
.opt-btn {
  background: #2a2a55; color: #fff; font-family: 'Nunito', sans-serif;
  font-weight: 700; text-align: left; padding: 14px;
}
</style>
</head>
<body>

<h1>📱 Jugador</h1>

<div id="state-join" class="state-card">
  <h3>Unirse a la sala</h3>
  <input type="text" id="code-input" placeholder="Código de la Sala" autocomplete="off" style="text-transform:uppercase;font-family:'Fredoka One',cursive;letter-spacing:4px;font-size:22px">
  <input type="text" id="name-input" placeholder="Tu Apodo" autocomplete="off" maxlength="12">
  
  <div style="margin:20px 0 10px;font-size:14px;color:#7777aa;">Elige tu avatar:</div>
  <div class="avatar-grid" id="avatar-grid"></div>
  
  <button onclick="joinRoom()" id="join-btn">¡Entrar!</button>
  <div id="error-msg" style="color:var(--p1);font-size:14px;margin-top:12px;font-weight:700;"></div>
</div>

<div id="state-lobby" class="state-card" style="display:none;">
  <div style="font-size:48px;margin-bottom:10px" id="my-avatar"></div>
  <h2 id="my-name">...</h2>
  <div class="loader"></div>
  <p style="color:#7777aa;">El profesor aún no inicia la partida.<br>Mira la pantalla grande.</p>
</div>

<div id="state-active" class="state-card" style="display:none;">
  <div id="active-content"></div>
</div>

<div id="state-ended" class="state-card" style="display:none;">
  <h2>¡Partida Terminada!</h2>
  <p style="color:#7777aa;margin-top:10px;">Mira la pantalla para ver el podio.</p>
  <button onclick="location.reload()" style="margin-top:20px">Jugar Otra</button>
</div>

<script>
// URL y Anon Key fijados para simplificar a los jugadores.
const SB_URL = 'https://zuyjbeyveiaepbsyvdwl.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1eWpiZXl2ZWlhZXBic3l2ZHdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MTM4OTUsImV4cCI6MjA5NjE4OTg5NX0.S8f9kmuoG6jiyRO40y56CEzH2NCnZxEUKfltIPhHRrQ';

const { createClient } = supabase;
const sb = createClient(SB_URL, SB_KEY);

const avatars = ['🤖','🐱‍💻','🦸‍♀️','🧙‍♂️','👾','🕵️'];
let selectedAvatar = avatars[0];
let sessionId = null;
let myId = null;
let currentSession = null;
let players = [];
let me = null;

const COLORS = ['#ff4757','#45d0f5','#ffd32a','#00d2a0','#b8a4ff','#ff6fa3'];

window.onload = () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('room');
  if(code) document.getElementById('code-input').value = code;

  const grid = document.getElementById('avatar-grid');
  grid.innerHTML = avatars.map(a=>`
    <div class="av-btn ${a===selectedAvatar?'selected':''}" onclick="selectAvatar(this,'${a}')">${a}</div>
  `).join('');
};

function selectAvatar(el, av){
  document.querySelectorAll('.av-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  selectedAvatar = av;
}

function showState(id){
  ['state-join','state-lobby','state-active','state-ended'].forEach(s=>{
    document.getElementById(s).style.display = s===id ? 'block' : 'none';
  });
}

function showError(msg){
  document.getElementById('error-msg').textContent = msg;
  setTimeout(()=>document.getElementById('error-msg').textContent='', 4000);
}

async function joinRoom(){
  const code = document.getElementById('code-input').value.trim().toUpperCase();
  const name = document.getElementById('name-input').value.trim();
  if(!code||!name) return showError('Completa todos los campos');

  const btn = document.getElementById('join-btn');
  btn.disabled = true; btn.textContent = 'Conectando...';

  try {
    const { data:sesh } = await sb.from('game_sessions').select('id,status').eq('room_code',code).single();
    if(!sesh) throw new Error('Sala no encontrada');
    if(sesh.status==='ended') throw new Error('Esta partida ya terminó');
    sessionId = sesh.id;

    const { count } = await sb.from('players').select('*',{count:'exact'}).eq('session_id',sessionId);
    if(count>=6) throw new Error('La sala está llena (máx 6)');

    const pColor = COLORS[count%COLORS.length];
    
    const { data:player, error:pErr } = await sb.from('players').insert({
      session_id: sessionId,
      name: name,
      avatar: selectedAvatar,
      color: pColor,
      turn_order: count
    }).select().single();
    
    if(pErr) throw pErr;
    myId = player.id;

    await sb.from('game_events').insert({
      session_id: sessionId, event_type: 'player_joined',
      payload: { player_id: myId, name: name }
    });

    document.getElementById('my-avatar').textContent = selectedAvatar;
    document.getElementById('my-name').textContent = name;
    
    await fetchSessionData();
    subscribeRealtime();

  } catch(e) {
    btn.disabled = false; btn.textContent = '¡Entrar!';
    showError(e.message);
  }
}

async function fetchSessionData(){
  const { data: sessionData } = await sb.from('game_sessions').select('*').eq('id', sessionId).single();
  currentSession = sessionData;
  const { data: playersData } = await sb.from('players').select('*').eq('session_id', sessionId).order('turn_order');
  players = playersData;
  me = players.find(p => p.id === myId);
  renderActiveState();
}

function subscribeRealtime(){
  sb.channel('public:game_sessions')
    .on('postgres_changes', {event:'UPDATE', schema:'public', table:'game_sessions', filter:`id=eq.${sessionId}`},
        payload => { currentSession = payload.new; renderActiveState(); })
    .subscribe();

  sb.channel('public:players')
    .on('postgres_changes', {event:'*', schema:'public', table:'players', filter:`session_id=eq.${sessionId}`},
        async () => {
          const { data } = await sb.from('players').select('*').eq('session_id', sessionId).order('turn_order');
          players = data;
          me = players.find(p => p.id === myId);
          renderActiveState();
        })
    .subscribe();
}

function renderActiveState() {
  if (!currentSession || !me) {
    showState('state-lobby');
    return;
  }

  const content = document.getElementById('active-content');
  const activePlayer = players[currentSession.current_turn];

  if (currentSession.status === 'lobby') {
    showState('state-lobby');
  } 
  else if (currentSession.status === 'active') {
    showState('state-active');
    if (me.turn_order === currentSession.current_turn) {
      content.innerHTML = `
        <div class="turn-box mine">
          <h3 style="color:#00d2a0;">¡Es tu turno!</h3>
          <button id="btn-tirar" style="background:#00d2a0;color:#0d0d1a;" onclick="throwDice()">🎲 Tirar Dado</button>
        </div>
      `;
    } else {
      content.innerHTML = `
        <div class="turn-box">
          <h3 style="color:${activePlayer?.color||'#fff'}">Turno de ${activePlayer?.avatar || ''} ${activePlayer?.name || '...'}</h3>
          <p>Mira la pantalla del profesor</p>
        </div>
      `;
    }
  } 
  else if (currentSession.status === 'question') {
    showState('state-active');
    const q = currentSession.current_question;
    
    if (me.turn_order === currentSession.current_turn) {
      if (me.answered) {
        content.innerHTML = `<div class="turn-box mine"><h3 style="color:#00d2a0;">¡Respuesta enviada!</h3><p>Mira la pantalla del profesor...</p></div>`;
      } else {
        const opts = typeof q.options === 'string' ? JSON.parse(q.options) : q.options;
        let html = `<div class="question-box"><h3>${q.emoji} ${q.question}</h3><div class="options-grid">`;
        opts.forEach((opt, i) => {
          html += `<button class="opt-btn" onclick="submitAnswer(${i})">${String.fromCharCode(65+i)}. ${opt}</button>`;
        });
        html += `</div></div>`;
        content.innerHTML = html;
      }
    } else {
      content.innerHTML = `
        <div class="turn-box">
          <h3 style="color:${activePlayer?.color||'#fff'}">${activePlayer?.name || 'El jugador'} está respondiendo...</h3>
          <p style="font-size:14px; margin-top:10px;">${q?.question}</p>
          <p style="font-size:12px; color:#7777aa; margin-top:10px;">Espera tu turno para jugar.</p>
        </div>
      `;
    }
  } 
  else if (currentSession.status === 'ended') {
    showState('state-ended');
  }
}

async function throwDice() {
  document.getElementById('btn-tirar').disabled = true;
  document.getElementById('btn-tirar').textContent = '🎲 Tirando...';
  const roll = Math.floor(Math.random() * 6) + 1;
  await sb.from('game_events').insert({
      session_id: sessionId,
      player_id: myId,
      event_type: 'dice_rolled',
      payload: { roll: roll, player_id: myId }
  });
}

async function submitAnswer(index) {
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  const q = currentSession.current_question;
  const isCorrect = (index === q.correct_index);
  await sb.from('players').update({
      answered: true,
      last_answer: index,
      last_correct: isCorrect
  }).eq('id', myId);
}
</script>
</body>
</html>
